[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# No [[redirects]] block — Nitro's netlify preset writes
# `.netlify/functions-internal/server/server.mjs` with `path: "/*"` +
# `preferStatic: true`, which registers the SSR handler with Netlify
# Functions v2 and serves static assets from `dist/` first. A `force = true`
# rewrite here would override `preferStatic` and break static asset serving.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
